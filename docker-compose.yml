services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: macrosentiment
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8002:8002"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/macrosentiment
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      VITE_API_URL: http://localhost:8002
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3002

volumes:
  pgdata:
